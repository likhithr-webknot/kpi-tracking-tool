spring.application.name=kpi
spring.config.import=optional:file:.env[.properties]
spring.profiles.default=dev
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:30}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:20000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1200000}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_DETECTION_MS:20000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.connection-test-query=${DB_CONNECTION_TEST_QUERY:SELECT 1}
spring.datasource.hikari.register-mbeans=${DB_POOL_REGISTER_MBEANS:true}

# Transaction management
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.transaction.default-timeout=30

spring.redis.enabled=${REDIS_ENABLED:false}
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.database=${REDIS_DB:0}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=${REDIS_TIMEOUT:2000}
spring.redis.jedis.pool.max-active=${REDIS_POOL_MAX_ACTIVE:20}
spring.redis.jedis.pool.max-idle=${REDIS_POOL_MAX_IDLE:10}
spring.redis.jedis.pool.min-idle=${REDIS_POOL_MIN_IDLE:5}
spring.redis.jedis.pool.max-wait=${REDIS_POOL_MAX_WAIT:-1ms}

jwt.secret=${JWT_SECRET:4xYf3P8jK2mQ9sV7nL5aB1cD6eR0tU3wZ8hN2pF4gH6kJ9mP1qR5sT7uV3xY8zA}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
auth.reset-token-expiration-ms=${AUTH_RESET_TOKEN_EXPIRATION_MS:900000}
auth.cookie.name=${AUTH_COOKIE_NAME:access_token}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE_SECONDS:86400}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.endpoint.prometheus.access=read-only
management.endpoint.health.access=read-only
management.endpoint.info.access=read-only

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}

logging.level.root=INFO
logging.level.com.webknot.kpi=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [req:%X{requestId:-}] %msg%n

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
server.forward-headers-strategy=framework
server.tomcat.max-threads=${SERVER_TOMCAT_MAX_THREADS:200}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:100}
server.tomcat.connection-timeout=${SERVER_TOMCAT_CONNECTION_TIMEOUT:20s}
server.compression.enabled=true
server.compression.min-response-size=2KB
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:5MB}
imports.csv.max-rows=${CSV_IMPORT_MAX_ROWS:10000}

app.security.permit-open-legacy-endpoints=${APP_SECURITY_PERMIT_OPEN_LEGACY_ENDPOINTS:true}
app.security.public-docs-enabled=${APP_SECURITY_PUBLIC_DOCS_ENABLED:true}
app.security.public-prometheus-enabled=${APP_SECURITY_PUBLIC_PROMETHEUS_ENABLED:false}
app.security.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}
app.security.cors.max-age-seconds=${APP_CORS_MAX_AGE_SECONDS:3600}
app.security.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000}
app.security.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.security.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-XSRF-TOKEN,X-CSRF-TOKEN,X-Requested-With,Accept,Origin}
app.security.cors.exposed-headers=${APP_CORS_EXPOSED_HEADERS:Set-Cookie,Authorization,X-Request-Id}
