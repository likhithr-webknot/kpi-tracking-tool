spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

auth.cookie.secure=true

management.endpoint.health.show-details=never
management.endpoint.prometheus.access=read-only
management.endpoint.health.access=read-only
management.endpoint.info.access=read-only

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

app.security.permit-open-legacy-endpoints=false
app.security.public-docs-enabled=false
app.security.public-prometheus-enabled=false
